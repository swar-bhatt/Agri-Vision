name: Reopen Issues on PR Revert

on:
  pull_request:
    types: [closed]

jobs:
  reopen_issue:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Reopen linked issues if PR is reverted
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            if (pr.title.startsWith("Revert")) {

              const body = pr.body || "";
              const issues = body.match(/#\d+/g);

              if (issues) {

                for (const issue of issues) {

                  const issue_number = parseInt(issue.replace("#", ""));

                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number,
                    state: "open"
                  });

                  console.log(`Reopened issue #${issue_number}`);
                }
              }
            }
